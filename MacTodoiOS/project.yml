name: MacTodoiOS
options:
  bundleIdPrefix: com.peeceebee
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  MacTodoCore:
    path: ../MacTodoCore

targets:
  MacTodoiOS:
    type: application
    platform: iOS
    sources:
      - MacTodoiOS
    dependencies:
      - package: MacTodoCore
        product: Models
      - package: MacTodoCore
        product: Storage
      - package: MacTodoCore
        product: ViewModels
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peeceebee.MacTodoiOS
        PRODUCT_NAME: MacTodo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    preBuildScripts:
      - name: Generate Azure Config
        script: |
          if [ -f "${SRCROOT}/../.env" ]; then
            export $(grep -v '^#' "${SRCROOT}/../.env" | xargs)
          fi
          "${SRCROOT}/../Scripts/generate-config.sh"
        outputFiles:
          - $(SRCROOT)/MacTodoiOS/GeneratedConfig.swift
